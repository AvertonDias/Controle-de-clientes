<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="128" fill="#4f46e5"/>
  <!-- stylized route trail -->
  <path d="M120 380 C180 320, 240 420, 320 340 C380 280, 300 200, 380 140" fill="none" stroke="#818cf8" stroke-width="24" stroke-linecap="round"/>
  <!-- package icon in the center -->
  <g transform="translate(196, 176)">
    <!-- Box top fold -->
    <path d="M60 10 L110 35 L60 60 L10 35 Z" fill="#c7d2fe" stroke="#312e81" stroke-width="10" stroke-linejoin="round"/>
    <!-- Box left side -->
    <path d="M10 35 L10 95 L60 120 L60 60 Z" fill="#818cf8" stroke="#312e81" stroke-width="10" stroke-linejoin="round"/>
    <!-- Box right side -->
    <path d="M60 60 L60 120 L110 95 L110 35 Z" fill="#6366f1" stroke="#312e81" stroke-width="10" stroke-linejoin="round"/>
    <!-- Packing tape -->
    <path d="M45 18 L75 32 L75 92 L45 78 Z" fill="#4f46e5" opacity="0.3"/>
  </g>
  <!-- destination pin indicator -->
  <g transform="translate(360, 90)">
    <circle cx="20" cy="20" r="24" fill="#fbbf24" stroke="#ffffff" stroke-width="6"/>
    <circle cx="20" cy="20" r="8" fill="#d97706"/>
  </g>
  <!-- origin pin indicator -->
  <g transform="translate(100, 360)">
    <circle cx="20" cy="20" r="20" fill="#10b981" stroke="#ffffff" stroke-width="6"/>
  </g>
</svg>
